    <main class="write-page">
      <header class="write-head">
        <p class="kicker">owner draft form</p>
        <h1>운영자용 글쓰기</h1>
        <p>
          이 화면은 게시글의 모양을 잡기 위한 정적 양식입니다. 방문자가 여기에 입력해도 저장되거나

          추가할 수 있는 사람만 할 수 있습니다.
        </p>
      </header>

      <form class="draft-form">
        <label>
          카테고리
          <select>
            <option>블로그</option>
            <option selected>메모</option>
            <option>프로젝트</option>
            <option>회고</option>
          </select>
        </label>
        <label>
          제목
          <input type="text" value="새 글 제목">
        </label>
        <label>
          날짜
          <input type="text" value="2026.05.17">
        </label>
        <label>
          본문
          <textarea rows="14">문제:

시도:

결과:

다음 행동:</textarea>
        </label>
      </form>
    </main>

    <footer class="site-footer">
