---
layout: default
title: 전체 글
board_script: true
---
<main class="board-layout">
  <aside class="category-panel" aria-labelledby="category-heading">
    <h1 id="category-heading">카테고리</h1>
    <ul class="category-list" data-category-list>
      <li>불러오는 중입니다.</li>
    </ul>
  </aside>

  <section class="board-main" aria-labelledby="board-heading">
    <div class="board-toolbar">
      <div>
        <p class="kicker" data-board-kicker>all posts</p>
        <h2 id="board-heading" data-board-heading>전체 글</h2>
      </div>
    </div>

    <table class="post-board">
      <caption>{{ site.title }} 전체 글 목록</caption>
      <thead>
        <tr>
          <th scope="col">No</th>
          <th scope="col">카테고리</th>
          <th scope="col">제목</th>
          <th scope="col">날짜</th>
        </tr>
      </thead>
      <tbody data-post-board>
        <tr>
          <td colspan="4">글 목록을 불러오는 중입니다.</td>
        </tr>
      </tbody>
    </table>

    <section class="plain-section" aria-labelledby="method-heading">
      <h2 id="method-heading">운영 방식</h2>
      <p>
        카테고리와 글은 Decap CMS에서 관리합니다. 운영자는 <code>/admin/</code>에서 GitHub로 로그인한 뒤
        카테고리와 글을 GUI로 추가하거나 수정할 수 있습니다.
      </p>
    </section>
  </section>
</main>
